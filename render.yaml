services:
  - type: web
    name: campus-lost-and-found
    runtime: node
    rootDir: .
    buildCommand: bash build.sh
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
